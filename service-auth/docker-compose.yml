services:
  postgres:
    image: postgres:16
    container_name: auth-eventos-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_service_eventos}
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_password_dev}
    ports:
      # 5441 en el host evita choque con un Postgres local en 5432
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_service_eventos}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
